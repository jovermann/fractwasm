<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FractWasm</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">FractWasm</div>
      <label class="date-field">Size
        <select id="sizeInput"></select>
      </label>
      <label class="date-field">Iterations
        <select id="iterationsInput"></select>
      </label>
      <label class="date-field">Palette
        <select id="paletteInput">
          <option value="spectrum">Spectrum</option>
          <option value="fire-ice">Fire & Ice</option>
          <option value="viridian-loop">Viridian Loop</option>
          <option value="ember-loop">Ember Loop</option>
          <option value="nocturne">Nocturne</option>
          <option value="mono-loop">Mono Loop</option>
        </select>
      </label>
      <label class="date-field">Cycle
        <select id="cycleLengthInput">
          <option value="16">16</option>
          <option value="32">32</option>
          <option value="64">64</option>
          <option value="128">128</option>
          <option value="256" selected>256</option>
          <option value="512">512</option>
          <option value="1024">1024</option>
          <option value="2048">2048</option>
          <option disabled>────────</option>
          <option value="16-alt">16 alt</option>
          <option value="32-alt">32 alt</option>
          <option value="64-alt">64 alt</option>
          <option value="128-alt">128 alt</option>
          <option value="256-alt">256 alt</option>
          <option value="512-alt">512 alt</option>
          <option value="1024-alt">1024 alt</option>
          <option value="2048-alt">2048 alt</option>
        </select>
      </label>
      <label class="date-field">Phase
        <select id="cyclePhaseInput">
          <option value="0" selected>0%</option>
          <option value="0.25">25%</option>
          <option value="0.5">50%</option>
          <option value="0.75">75%</option>
        </select>
      </label>
      <label class="date-field">Algo
        <select id="algoInput">
          <option value="plain" selected>Plain</option>
          <option value="ssg">Super Solid Guessing</option>
        </select>
      </label>
      <label class="date-field">Mode
        <select id="modeInput">
          <option value="mandelbrot" selected>Mandelbrot</option>
          <option value="mand-center-julia">MandCenter+Julia</option>
          <option value="mand-mouse-julia">MandMouse+Julia</option>
        </select>
      </label>
      <label class="date-field">
        <input id="progressInput" type="checkbox" checked />
        Progress
      </label>
      <button id="resetViewButton" class="btn">Reset View</button>
      <button id="renderButton" class="btn accent">Render</button>
      <div class="topbar-spacer"></div>
      <div id="statusText" class="status-pill">Loading renderer…</div>
    </header>

    <main>
      <section class="viewer-shell">
        <div class="panel-header">
          <div class="panel-title-wrap">
            <div class="panel-title">Mandelbrot Explorer</div>
            <div class="panel-title-meta">Drag to pan, wheel to zoom, double click to recenter</div>
          </div>
        </div>
        <div class="viewer-stage" id="viewerStage">
          <div class="viewer-pane">
            <div class="viewer-label">Mandelbrot</div>
            <canvas id="fractalCanvas" aria-label="Mandelbrot set"></canvas>
          </div>
          <div class="viewer-pane julia-pane" id="juliaPane" hidden>
            <div class="viewer-label">Julia</div>
            <canvas id="juliaCanvas" aria-label="Julia set"></canvas>
          </div>
          <div id="loadingOverlay" class="loading-overlay" hidden>Rendering…</div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
